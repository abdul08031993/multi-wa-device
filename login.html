<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - WA Gateway</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
        }
        .card {
            border-radius: 15px;
            border: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .btn-primary {
            background: #667eea;
            border: none;
            padding: 12px;
            font-weight: bold;
        }
        .btn-primary:hover {
            background: #5a67d8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card p-4">
                    <h3 class="text-center mb-4">Masuk ke Dashboard</h3>
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" id="lUser" class="form-control" placeholder="Masukkan username">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" id="lPass" class="form-control" placeholder="Masukkan password">
                    </div>
                    <button onclick="login()" id="loginBtn" class="btn btn-primary w-100">Masuk Sekarang</button>
                    <p class="mt-3 text-center small">
                        Belum punya akun? <a href="register.html" style="color: #667eea; font-weight: bold; text-decoration: none;">Daftar di sini</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function login() {
            const btn = document.getElementById('loginBtn');
            const userInp = document.getElementById('lUser').value;
            const passInp = document.getElementById('lPass').value;

            if(!userInp || !passInp) return alert("Isi semua bidang!");

            btn.innerText = "Mencoba Masuk...";
            btn.disabled = true;

            try {
                const res = await fetch('/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        username: userInp,
                        password: passInp
                    })
                });

                const data = await res.json();

                if(res.ok && data.id) {
                    // PENTING: Simpan dalam bentuk objek 'user' agar dibaca Dashboard
                    localStorage.setItem('user', JSON.stringify({
                        id: data.id,
                        username: data.username
                    }));
                    
                    // Simpan token dummy agar pengecekan !token di dashboard tidak error
                    localStorage.setItem('token', 'active_session');

                    alert("Login Berhasil!");
                    window.location.href = '/'; // Ke Dashboard Utama
                } else {
                    alert(data.error || "Username atau Password salah!");
                    btn.innerText = "Masuk Sekarang";
                    btn.disabled = false;
                }
            } catch (err) {
                alert("Gagal terhubung ke server!");
                btn.innerText = "Masuk Sekarang";
                btn.disabled = false;
            }
        }

        // Jalankan login saat tekan Enter
        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
