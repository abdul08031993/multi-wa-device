<!DOCTYPE html>
<html>
<head>
    <title>Login - WA Gateway</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4 card p-4 shadow-sm">
                <h3 class="text-center mb-4">Login User</h3>
                <div class="mb-3">
                    <input type="text" id="lUser" class="form-control" placeholder="Username">
                </div>
                <div class="mb-3">
                    <input type="password" id="lPass" class="form-control" placeholder="Password">
                </div>
                <button onclick="login()" class="btn btn-primary w-100">Masuk</button>
                <p class="mt-3 text-center small">Belum punya akun? <a href="/register.html">Daftar</a></p>
            </div>
        </div>
    </div>
    <script>
        async function login() {
            const res = await fetch('/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    username: document.getElementById('lUser').value,
                    password: document.getElementById('lPass').value
                })
            });
            const data = await res.json();
            if(data.userId) {
                // SIMPAN DATA KE BROWSER
                localStorage.setItem('userId', data.userId);
                localStorage.setItem('username', data.username);
                window.location.href = '/'; // Ke Dashboard
            } else { alert("Username/Password salah!"); }
        }
    </script>
</body>
</html>
