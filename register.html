<!DOCTYPE html>
<html>
<head>
    <title>Daftar Akun - WA Gateway</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4 card p-4 shadow-sm">
                <h3 class="text-center mb-4">Registrasi</h3>
                <div class="mb-3">
                    <input type="text" id="regUser" class="form-control" placeholder="Username">
                </div>
                <div class="mb-3">
                    <input type="password" id="regPass" class="form-control" placeholder="Password">
                </div>
                <button onclick="register()" class="btn btn-success w-100">Daftar Sekarang</button>
                <p class="mt-3 text-center small">Sudah punya akun? <a href="/login.html">Login</a></p>
            </div>
        </div>
    </div>
    <script>
        async function register() {
            const res = await fetch('/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    username: document.getElementById('regUser').value,
                    password: document.getElementById('regPass').value
                })
            });
            const data = await res.json();
            if(data.userId) {
                alert("Registrasi Berhasil! Silakan Login.");
                window.location.href = '/login.html';
            } else { alert(data.error || "Gagal daftar"); }
        }
    </script>
</body>
</html>
