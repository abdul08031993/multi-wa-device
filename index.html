<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Blast Dashboard - User</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* ... (Gunakan semua CSS yang kamu kirim tadi di sini) ... */
    :root { --primary: #667eea; --success: #2ecc71; --warning: #f39c12; --danger: #e74c3c; --dark: #2c3e50; }
    body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; margin:0; }
    .dashboard-container { max-width: 1400px; margin: 0 auto; padding: 20px; }
    .navbar { background: white; border-radius: 15px; padding: 15px 30px; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; }
    .balance-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
    .balance-card { background: linear-gradient(135deg, var(--primary) 0%, #764ba2 100%); border-radius: 15px; padding: 25px; color: white; }
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
    .stat-card { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
    .accounts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
    .account-card { background: white; border-radius: 15px; padding: 20px; position: relative; }
    .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); overflow-y: auto; }
    .modal-content { background: white; margin: 50px auto; padding: 30px; border-radius: 15px; max-width: 500px; position: relative; }
    /* ... (Tambahkan sisa CSS kamu di sini) ... */
  </style>
</head>
<body>
  <div class="dashboard-container">
    <nav class="navbar">
      <h1><span>📱</span> My Blast Dashboard</h1>
      <div class="user-info">
        <span class="username-badge" id="username">Memuat...</span>
        <button class="logout-btn" onclick="logout()">🚪 Logout</button>
      </div>
    </nav>

    <div class="balance-grid">
      <div class="balance-card">
        <div class="balance-label">Saldo Saat Ini</div>
        <div class="balance-value" id="currentBalance">Rp 0</div>
      </div>
      <div class="balance-card" style="background: #2ecc71">
        <div class="balance-label">Pending Withdraw</div>
        <div class="balance-value" id="pendingBalance">Rp 0</div>
      </div>
      <div class="balance-card" style="background: #f39c12">
        <div class="balance-label">Total Blast</div>
        <div class="balance-value" id="totalBlasted">0</div>
      </div>
    </div>

    <div class="action-bar" style="display:flex; justify-content:space-between; margin-bottom:20px">
      <h2 style="color:white">Akun WhatsApp Saya</h2>
      <button class="btn btn-success" onclick="showModal('addAccountModal')" style="padding:10px 20px; border-radius:10px; border:none; cursor:pointer; background:#2ecc71; color:white">➕ Tambah Akun</button>
    </div>

    <div class="accounts-grid" id="accountsList">
        </div>

    <div style="margin-top: 30px; text-align: right;">
        <button class="btn btn-primary" onclick="showModal('withdrawModal')" style="padding:15px 30px; border-radius:10px; background:#fff; color:#667eea; font-weight:bold; border:none; cursor:pointer">💰 Tarik Saldo</button>
    </div>
  </div>

  <div id="withdrawModal" class="modal">
    <div class="modal-content">
      <span onclick="closeModal('withdrawModal')" style="float:right; cursor:pointer">&times;</span>
      <h2>💰 Tarik Saldo</h2>
      <form id="withdrawForm" style="margin-top:20px">
        <input type="number" id="wdAmount" placeholder="Jumlah (Min 50.000)" style="width:100%; padding:10px; margin-bottom:10px" required>
        <input type="text" id="wdBank" placeholder="Detail Bank (Nama - No Rek - Bank)" style="width:100%; padding:10px; margin-bottom:10px" required>
        <button type="submit" style="width:100%; padding:10px; background:#2ecc71; color:white; border:none; border-radius:5px">Kirim Pengajuan</button>
      </form>
    </div>
  </div>

  <div id="addAccountModal" class="modal">
    <div class="modal-content">
      <span onclick="closeModal('addAccountModal')" style="float:right; cursor:pointer">&times;</span>
      <h2>➕ Tambah Nomor WA</h2>
      <form id="addAccountForm" style="margin-top:20px">
        <input type="text" id="waNumber" placeholder="628xxx" style="width:100%; padding:10px; margin-bottom:10px" required>
        <button type="submit" style="width:100%; padding:10px; background:#667eea; color:white; border:none; border-radius:5px">Simpan Nomor</button>
      </form>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const user = JSON.parse(localStorage.getItem('user'));
    if(!user) window.location.href = '/login';
    document.getElementById('username').innerText = user.username;

    async function loadData() {
        // Load User Stats & Balance
        const res = await fetch('/api/user/my-stats').then(r => r.json());
        document.getElementById('currentBalance').innerText = 'Rp ' + res.balance.toLocaleString();
        document.getElementById('totalBlasted').innerText = res.totalSent;
        document.getElementById('pendingBalance').innerText = 'Rp ' + (res.pendingWd || 0).toLocaleString();

        // Load Accounts
        const accRes = await fetch('/api/user/my-accounts').then(r => r.json());
        const list = document.getElementById('accountsList');
        list.innerHTML = accRes.map(acc => `
            <div class="account-card">
                <span style="background:${acc.status === 'CONNECTED' ? '#2ecc71' : '#999'}; color:white; padding:2px 10px; border-radius:10px; font-size:12px">${acc.status}</span>
                <h3 style="margin-top:10px">${acc.waNumber}</h3>
                <p style="color:#666">Sesi: ${acc.sessionName}</p>
                <div style="margin-top:15px">
                    ${acc.status !== 'CONNECTED' ? `<button onclick="startScan('${acc.sessionName}')" style="background:#667eea; color:white; border:none; padding:5px 15px; border-radius:5px; cursor:pointer">Scan QR</button>` : `<span style="color:#2ecc71">● Aktif</span>`}
                </div>
            </div>
        `).join('');
    }

    function showModal(id) { document.getElementById(id).style.display = 'block'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    // Proses Withdraw
    document.getElementById('withdrawForm').onsubmit = async (e) => {
        e.preventDefault();
        const amount = document.getElementById('wdAmount').value;
        const bankInfo = document.getElementById('wdBank').value;
        
        const res = await fetch('/api/user/withdraw', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ userId: user.id, amount, bankInfo })
        }).then(r => r.json());

        alert(res.message);
        location.reload();
    };

    function logout() {
        localStorage.clear();
        window.location.href = '/login';
    }

    window.onload = loadData;
  </script>
</body>
</html>
